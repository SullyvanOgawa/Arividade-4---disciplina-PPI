<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Formulario de Login</title>
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-body-tertiary">
    <main class="w-100 m-auto py-5 px-4 rounded-4 shadow-lg bg-dark" style="max-width: 400px;">
        <form method="POST" action="/login" class="row g-3">
            <h1 class="h3 mb-3 fw-normal text-center">Login</h1>

                <div class="form-floating mb-3">
                    <label for="usuario">Usuário:</label>
                    <input type="text" class="form-control" id="usuario" name="usuario" value="" placeholder="Digite o seu usuário" required>
                </div>
            
                <div class="form-floating mb-3">
                    <label for="password">Senha:</label>
                    <input type="password" class="form-control" id="senha" name="senha" required>
                </div>
            
                <div class="col-12">
                    <button class="btn btn-primary w-100 py-2" type="submit">Login</button>
                    <button class="btn btn-secundary w-100 py-2" type="button" onclick="history.back()">Voltar</button>
            </div>  
        </form>
   </main>
    
</body>
</html>
