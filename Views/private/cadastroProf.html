<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Cadastro de Professores</title>
</head>
<body class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">
            <div class="card p-4 shadow mb-4">
                <h3 class="mb-3 text-center">Cadastro de Professor</h3>

                <form id="formProfessores" method="POST" action="#" class="row g-3">
                    <div class="col-md-2">
                        <label for="id" class="form-label">Id</label>
                        <input type="text" class="form-control" id="id" name="id" value="" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="nomeProf" class="form-label">Nome do Professor</label>
                        <input type="text" class="form-control" id="nomeProf" name="nomeProf" value="" required>
                    </div>

                    <div class="mb-3">
                        <label  for ="especialidade" class="form-label">Especialidade</label>
                        <input type="text" class="form-control" id="especialidade" name="especialidade" value="" required>
                    </div>

                    <div class="row mt-5 mb-4 text-center">
                        <div class="col-12">
                            <button class="btn btn-primary me-2" id='cadastrar' type="button">Cadastrar</button>
                            <button class="btn btn-warning me-2" id='atualizar' type="button">Atualizar</button>
                            <button class="btn btn-danger me-2" id='excluir' type="button">Excluir</button>
                            <button class="btn btn-secondary me-2" type="button" onclick="history.back()">Voltar</button>
                        </div>
                    </div>
                </form>

                <div id="mensagem"></div>
            </div>

          
        </div>
        <div id="exibeProfessor"></div>
    </div>
    <script src="scripts/professor.js"></script>
</body>
</html>
