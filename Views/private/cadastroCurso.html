<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">
            <div class="card p-4 shadow mb-4">
                <h3 class="mb-3 text-center">Cadastro de Cursos</h3>

                <form>
                    <div class="mb-3">
                        <label for="nomeCurso" class="form-label">Nome do Curso</label>
                        <input type="text" class="form-control" id="nomeCurso" name="nomeCurso" value="" required>
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <input type="text" class="form-control" id="descricao" name="descricao" value="" required>
                    </div>

                    <div class="mb-3">
                        <label for="cargaHoraria" class="form-label">Carga Horária</label>
                        <input type="number" class="form-control" id="cargaHoraria" name="cargaHoraria">
                    </div>

                    <div class="col-md-12 mb-5">
                        <label for="professor" class="form-label">Professor</label>
                        <select class="form-select" name="professor" id="professor" required>
                            <option selected disabled value="">Escolha o Professor</option>
                        </select>
                        
                    </div>

                    <div class="row mt-5 mb-4 text-center">
                        <div class="col-12">
                            <button class="btn btn-primary me-2" id='cadastrar' type="button">Cadastrar</button>
                            <button class="btn btn-warning me-2" id='atualizar' type="button" >Atualizar</button>
                            <button class="btn btn-danger me-2" id='excluir' type="button" >Excluir</button>
                            <button class="btn btn-secondary me-2" type="button" onclick="history.back()">Voltar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</body>
</html>
